#   info " вҖӢ вҖӢ пӮ… " cpu_usage
    info " вҖӢ вҖӢ у°ҳҡ " gpu
#   info " вҖӢ вҖӢ  пӮ… " gpu_driver
#   info " вҖӢ вҖӢ пӮ  " disk
    info " вҖӢ вҖӢ у°‘ӯ " memory
#   info " вҖӢ вҖӢ уұҲ‘ " battery
    info " вҖӢ вҖӢ у°Қ№ " resolution
    prin "в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ"
