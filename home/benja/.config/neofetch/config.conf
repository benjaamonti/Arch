#   info " вҖӢ вҖӢ  у°Җ» " icons
    info " вҖӢ вҖӢ у°Ҡ  " packages 
    info " вҖӢ вҖӢ  у°…җ " uptime
    info " вҖӢ вҖӢ  пҮ« " local_ip
#   info " вҖӢ вҖӢ  пҮ« " public_ip
    prin "в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n Hardware Information \nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө"
    info " вҖӢ вҖӢ у°Ңў " model
